---
- name: Ensure target directory exists
  ansible.builtin.file:
    path: /var/lib/guacamole/init
    state: directory
    mode: '0755'

- name: Check if schema file already exists locally
  ansible.builtin.stat:
    path: /var/lib/guacamole/init/01-initdb.sql
  register: guac_schema_file

- name: Generate DB schema via temporary docker container
  community.docker.docker_container:
    name: guacamole_init_temp
    image: guacamole/guacamole:latest
    command: /opt/guacamole/bin/initdb.sh --postgresql
    state: started
    detach: false
    cleanup: true
  register: guac_init_output
  when: not guac_schema_file.stat.exists

- name: Save DB schema to persistent storage directory
  ansible.builtin.copy:
    content: "{{ guac_init_output.container.Output }}"
    dest: /var/lib/guacamole/init/01-initdb.sql
    mode: '0644'
  when: 
    - not guac_schema_file.stat.exists
    - guac_init_output is changed

- name: Deploy docker-compose.yml configuration
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: /var/lib/guacamole/docker-compose.yml
    mode: '0644'

- name: Deploy Guacamole stack with Docker Compose
  community.docker.docker_compose_v2:
    project_src: /var/lib/guacamole
    state: present
    recreate: always