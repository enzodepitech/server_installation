---
# Architecture mapping for Docker repository
docker_arch: "{{ 'amd64' if ansible_architecture == 'x86_64' else ansible_architecture }}"

# Docker APT repository
docker_repo_url: "https://download.docker.com/linux/{{ ansible_distribution | lower }}"
docker_repo: >-
  deb [arch={{ docker_arch }} signed-by=/etc/apt/keyrings/docker.asc]
  {{ docker_repo_url }} {{ ansible_distribution_release }} stable

# Docker daemon configuration (empty by default)
# Example:
#   docker_daemon_config:
#     log-driver: "json-file"
#     log-opts:
#       max-size: "10m"
#       max-file: "3"
docker_daemon_config: {}