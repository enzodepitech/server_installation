---
- name: Create Homepage project and configuration directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - "{{ homepage_dir }}"
    - "{{ homepage_dir }}/config"

- name: Render Docker Compose configuration
  ansible.builtin.template:
    src: templates/docker-compose.yml.j2
    dest: "{{ homepage_dir }}/docker-compose.yml"
    mode: '0644'
  notify: Restart Homepage

- name: Render Homepage settings configuration
  ansible.builtin.template:
    src: templates/settings.yaml.j2
    dest: "{{ homepage_dir }}/config/settings.yaml"
    mode: '0644'

- name: Render Homepage services configuration
  ansible.builtin.template:
    src: templates/services.yaml.j2
    dest: "{{ homepage_dir }}/config/services.yaml"
    mode: '0644'

- name: Render Homepage docker integration configuration
  ansible.builtin.template:
    src: templates/docker.yaml.j2
    dest: "{{ homepage_dir }}/config/docker.yaml"
    mode: '0644'

- name: Deploy and start Homepage container stack
  community.docker.docker_compose_v2:
    project_src: "{{ homepage_dir }}"
    state: present