---
- name: Proxmox Configuration
  hosts: proxmox
  become: true
  roles:
    - proxmox

- name: Deploy Nginx Proxy Manager
  hosts: proxy
  become: true
  roles:
    - docker
    - nginxPM

- name: Deploy Guacamole Server
  hosts: guacamole
  become: true
  roles:
    - docker
    - guacamole

- name: Deploy Homepage (Dashboard)
  hosts: dashboard
  become: true
  roles:
    - docker
    - homepage

- name: Deploy VM Party (VM Manager)
  hosts: vmparty
  become: true
  roles:
    - docker
    - vmparty
